<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AND: Tiny Kingdoms v0.4.1</title>
<style>
:root{--blue:#0f7ee8;--gold:#f7b735;--dark:#122033;--panel:#173450;--cream:#fff0bd;--green:#43b047;--red:#d8463c;--purple:#8d45d8}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#07111f;font-family:Arial,Helvetica,sans-serif;color:#fff;overflow:hidden}button{font:inherit;cursor:pointer}
#app{position:relative;width:100vw;height:100vh;overflow:hidden;background:linear-gradient(#137ce1 0%,#76c8ff 55%,#c6f0ff 100%)}
.sky:before,.sky:after{content:"";position:absolute;inset:0;background-repeat:repeat-x;animation:clouds 38s linear infinite;opacity:.9;pointer-events:none}
.sky:before{background-image:radial-gradient(ellipse at 40px 24px,#fff 0 18px,transparent 19px),radial-gradient(ellipse at 70px 24px,#fff 0 24px,transparent 25px),radial-gradient(ellipse at 100px 30px,#fff 0 18px,transparent 19px);background-size:360px 130px;background-position:0 80px}
.sky:after{background-image:radial-gradient(ellipse at 30px 18px,#fff 0 12px,transparent 13px),radial-gradient(ellipse at 55px 18px,#fff 0 16px,transparent 17px),radial-gradient(ellipse at 80px 22px,#fff 0 12px,transparent 13px);background-size:280px 110px;background-position:60px 210px;opacity:.45;animation-duration:55s}@keyframes clouds{from{background-position-x:0}to{background-position-x:-720px}}
.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:24px}.screen.active{display:flex}
.menu-wrap{position:relative;width:min(1180px,96vw);height:min(720px,94vh);border-radius:26px;padding:28px;background:linear-gradient(180deg,rgba(12,86,165,.25),rgba(10,28,55,.45));box-shadow:0 22px 70px rgba(0,0,0,.4),inset 0 0 0 4px rgba(255,255,255,.12);overflow:hidden}.island{position:absolute;border-radius:50%;background:linear-gradient(#58bd36 0 22%,#8a4d24 23% 70%,#553015 71%);filter:drop-shadow(0 20px 15px rgba(0,0,0,.25))}.island.i1{width:210px;height:95px;left:60px;top:120px}.island.i2{width:260px;height:120px;right:75px;top:100px}.island.i3{width:170px;height:80px;left:130px;bottom:110px}.castle{position:absolute;right:130px;top:28px;font-size:78px;text-shadow:0 5px 0 rgba(0,0,0,.2)}.windmill{position:absolute;left:115px;top:65px;font-size:58px}.logo{text-align:center;position:relative;z-index:2;margin-top:4px}.logo h1{font-size:112px;line-height:.8;margin:0;color:#ffbf2e;text-shadow:0 8px 0 #8e3d14,0 13px 0 #42200c,0 18px 20px rgba(0,0,0,.35);letter-spacing:6px}.logo .sub{display:inline-block;margin-top:10px;background:linear-gradient(#6a3b1d,#2c1609);border:4px solid #d9953e;border-radius:12px;padding:8px 28px;font-size:26px;font-weight:900;text-transform:uppercase;text-shadow:0 3px #000;box-shadow:0 10px 0 rgba(0,0,0,.2)}
.hero-title{text-align:center;font-size:30px;font-weight:900;text-transform:uppercase;margin:26px 0 18px;text-shadow:0 3px #244b7d;letter-spacing:2px}.characters{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;position:relative;z-index:2}.card{border:4px solid #f7d36c;border-radius:18px;background:linear-gradient(180deg,rgba(15,60,98,.82),rgba(5,20,36,.9));padding:12px 12px 14px;text-align:center;box-shadow:0 10px 0 rgba(0,0,0,.25);transition:.2s;min-height:300px}.card.selected{transform:translateY(-8px);box-shadow:0 0 0 5px rgba(255,255,255,.35),0 16px 0 rgba(0,0,0,.25)}.avatar{height:170px;border-radius:14px;margin-bottom:8px;display:flex;align-items:end;justify-content:center;background:linear-gradient(180deg,#6ecbff,#2574c6);overflow:hidden}.card:nth-child(2) .avatar{background:linear-gradient(180deg,#ffb15a,#a22d2d)}.card:nth-child(3) .avatar{background:linear-gradient(180deg,#48d684,#145d50)}.card:nth-child(4) .avatar{background:linear-gradient(180deg,#db8cff,#7247ce)}.sprite{position:relative;width:80px;height:116px;margin-bottom:10px;image-rendering:pixelated;animation:bob 1.4s infinite ease-in-out}.sprite .head{position:absolute;left:20px;top:8px;width:42px;height:42px;border-radius:14px;background:#f6c28c;box-shadow:inset -5px -5px #d68b55}.sprite .hair{position:absolute;left:16px;top:0;width:50px;height:26px;border-radius:18px;background:#7b3d18}.sprite .body{position:absolute;left:18px;top:50px;width:46px;height:44px;border-radius:10px;background:#1d69c9}.sprite .leg1,.sprite .leg2{position:absolute;top:88px;width:18px;height:24px;border-radius:7px;background:#263247}.sprite .leg1{left:20px}.sprite .leg2{right:18px}.sprite .arm1,.sprite .arm2{position:absolute;top:56px;width:14px;height:35px;border-radius:7px;background:#f6c28c}.sprite .arm1{left:3px}.sprite .arm2{right:3px}.sprite .eye1,.sprite .eye2{position:absolute;top:25px;width:5px;height:7px;background:#08304f;border-radius:50%}.sprite .eye1{left:31px}.sprite .eye2{right:29px}.sprite.noah .body{background:#cb2f31}.sprite.noah .hair{background:#111}.sprite.nox .head{background:#47d9bd}.sprite.nox .hair{background:#59d746}.sprite.nox .body{background:#255647}.sprite.luna .head{background:#ffd1a3}.sprite.luna .hair{background:#ffd34f;width:58px;left:12px;height:58px}.sprite.luna .body{background:#f06aae;width:54px;left:14px;border-radius:18px 18px 8px 8px}.sprite.luna:before{content:'👑';position:absolute;top:-17px;left:24px;font-size:26px;z-index:2}@keyframes bob{50%{transform:translateY(-6px)}}.card h3{margin:0 0 8px;font-size:25px;background:linear-gradient(#ffe9a8,#e5b760);color:#14223b;border-radius:8px;padding:6px}.stats{font-size:15px;text-align:left;line-height:1.55}.stats b{display:inline-block;width:70px}.start-row{position:absolute;left:0;right:0;bottom:28px;text-align:center;z-index:3}.btn{border:4px solid #8e4a13;background:linear-gradient(#ffd86e,#e08814);color:white;text-shadow:0 3px #6d350a;border-radius:16px;padding:16px 46px;font-size:30px;font-weight:900;box-shadow:0 8px 0 #6e330b,0 15px 20px rgba(0,0,0,.25)}.btn:hover{transform:translateY(-2px)}.smallbar{position:absolute;left:20px;top:20px;z-index:5;display:flex;gap:12px}.pill{background:rgba(9,25,45,.8);border:3px solid rgba(255,255,255,.25);border-radius:10px;padding:12px 18px;font-weight:800}.gear{position:absolute;right:24px;top:20px;font-size:34px;background:#24364b;border:3px solid #111;border-radius:10px;padding:8px;z-index:5}
#game{display:none;position:absolute;inset:0;background:#7bd1ff}#gameCanvas{width:100%;height:100%;display:block;image-rendering:pixelated}.hud{position:absolute;top:18px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}.hudPanel{background:rgba(14,38,63,.86);border:4px solid #f6c45a;border-radius:14px;padding:10px 14px;box-shadow:0 6px 0 rgba(0,0,0,.25);font-weight:900;text-shadow:0 2px #000}.hudPanel span{margin-right:16px}.help{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.45);padding:8px 16px;border-radius:999px;font-size:14px}#toast{position:absolute;left:50%;top:90px;transform:translateX(-50%);background:#fff0bd;color:#18324d;border:4px solid #d58b21;border-radius:14px;padding:12px 18px;font-weight:900;display:none}.endBox{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center}.endCard{background:linear-gradient(#fff3c4,#f5c45a);color:#163657;border:6px solid #7c4316;border-radius:22px;padding:32px 44px;text-align:center;box-shadow:0 18px 0 rgba(0,0,0,.28)}.endCard h2{font-size:46px;margin:0 0 10px}.endCard p{font-size:22px}.endCard button{font-size:22px}.asset-note{position:absolute;right:12px;bottom:8px;font-size:12px;opacity:.7}
@media(max-width:900px){.logo h1{font-size:70px}.characters{gap:8px}.card{padding:8px;min-height:250px}.avatar{height:125px}.sprite{transform:scale(.74);transform-origin:bottom}.hero-title{font-size:22px}.btn{font-size:22px}.stats{display:none}.card h3{font-size:18px}}
</style>
</head>
<body>
<div id="app" class="sky">
  <section id="menu" class="screen active">
    <div class="menu-wrap">
      <div class="smallbar"><div class="pill">🌐 Italiano</div></div><div class="gear">⚙️</div>
      <div class="island i1"></div><div class="island i2"></div><div class="island i3"></div><div class="castle">🏰</div><div class="windmill">🛖</div>
      <div class="logo"><h1>AND</h1><div class="sub">Tiny Kingdoms</div></div>
      <div class="hero-title">Scegli il tuo personaggio</div>
      <div class="characters" id="characters"></div>
      <div class="start-row"><button class="btn" id="startBtn">⚔️ Inizia Avventura</button></div>
      <div class="asset-note">v0.4.1 · art set base</div>
    </div>
  </section>
  <section id="game">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
    <div class="hud"><div class="hudPanel" id="leftHud"></div><div class="hudPanel" id="rightHud"></div></div>
    <div id="toast"></div>
    <div class="help">← → / A D muovi · Spazio salta · R ricomincia · ESC menu</div>
    <div class="endBox" id="endBox"><div class="endCard"><h2>Livello completato!</h2><p id="endStats"></p><button class="btn" onclick="backToMenu()">Torna al menu</button></div></div>
  </section>
</div>
<script>
const heroes=[
{name:'Leo',class:'leo',desc:'Esploratore equilibrato',color:'#1d69c9',speed:4.2,jump:13,stars:['★★★☆','★★★☆','★★★☆']},
{name:'Kael',class:'noah',desc:'Avventuriero veloce',color:'#cb2f31',speed:4.9,jump:12.2,stars:['★★★★','★★★☆','★★☆☆']},
{name:'Zipp',class:'nox',desc:'Creatura misteriosa',color:'#255647',speed:4.0,jump:13.8,stars:['★★☆☆','★★★★','★★★★']},
{name:'Luna',class:'luna',desc:'Principessa coraggiosa',color:'#f06aae',speed:4.1,jump:14.6,stars:['★★★☆','★★★★★','★★☆☆']}
];
let selected=0;const chars=document.getElementById('characters');
function renderCards(){chars.innerHTML='';heroes.forEach((h,i)=>{const c=document.createElement('div');c.className='card '+(i===selected?'selected':'');c.onclick=()=>{selected=i;renderCards()};c.innerHTML=`<div class="avatar"><div class="sprite ${h.class}"><div class="hair"></div><div class="head"></div><div class="eye1"></div><div class="eye2"></div><div class="body"></div><div class="arm1"></div><div class="arm2"></div><div class="leg1"></div><div class="leg2"></div></div></div><h3>${h.name}</h3><div class="stats"><b>Velocità</b> ${h.stars[0]}<br><b>Salto</b> ${h.stars[1]}<br><b>Forza</b> ${h.stars[2]}<br><em>${h.desc}</em></div>`;chars.appendChild(c)})}renderCards();
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');let W=canvas.width,H=canvas.height;
let keys={},camX=0,gameState='menu',crystals=0,life=5,energy=100,checkpoint={x:120,y:350},toastTimer=0,end=false;
const tile=48,worldW=4200,gravity=.65;let platforms=[],crystalItems=[],enemies=[],particles=[],hero=heroes[0],player;
function startGame(){hero=heroes[selected];document.getElementById('menu').classList.remove('active');document.getElementById('game').style.display='block';resetLevel();gameState='play';requestAnimationFrame(loop)}
document.getElementById('startBtn').onclick=startGame;
function backToMenu(){gameState='menu';document.getElementById('game').style.display='none';document.getElementById('menu').classList.add('active');document.getElementById('endBox').style.display='none';end=false}
window.backToMenu=backToMenu;addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key==='Escape')backToMenu();if(e.key.toLowerCase()==='r'&&gameState==='play')resetLevel()});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function resetLevel(){crystals=0;life=5;energy=100;camX=0;checkpoint={x:120,y:360};end=false;document.getElementById('endBox').style.display='none';player={x:120,y:300,w:34,h:54,vx:0,vy:0,onGround:false,face:1,anim:0,invul:0};buildWorld();showToast('Raccogli i Cristalli del Cielo!')}
function buildWorld(){platforms=[];crystalItems=[];enemies=[];particles=[];function plat(x,y,w,h,type='grass'){platforms.push({x,y,w,h,type})}
plat(0,590,720,130);plat(820,560,390,160);plat(1320,510,420,210);plat(1840,570,360,150);plat(2300,520,530,200);plat(2980,580,420,140);plat(3520,540,600,180);plat(450,450,180,38,'wood');plat(980,400,180,38,'stone');plat(1450,350,160,38,'wood');plat(2050,410,200,38,'stone');plat(2600,345,180,38,'wood');plat(3280,415,180,38,'stone');for(let x=220;x<3920;x+=360)crystalItems.push({x,y:260+Math.sin(x)*55,r:16,got:false});crystalItems.push({x:3600,y:420,r:16,got:false});enemies=[{x:900,y:522,w:42,h:34,dir:1,min:830,max:1180},{x:1900,y:532,w:42,h:34,dir:-1,min:1840,max:2180},{x:3120,y:545,w:42,h:34,dir:1,min:2990,max:3370}];}
function rects(a,b){return a.x<a.x+a.w&&a.x+b.w>b.x&&a.y<a.y+a.h&&a.y+b.h>b.y}
function solidCollision(){player.onGround=false;for(const p of platforms){if(player.x<p.x+p.w&&player.x+player.w>p.x&&player.y<p.y+p.h&&player.y+player.h>p.y){const prevBottom=player.y+player.h-player.vy;if(prevBottom<=p.y+8&&player.vy>=0){player.y=p.y-player.h;player.vy=0;player.onGround=true}else if(player.vy<0&&player.y>=p.y+p.h-8){player.y=p.y+p.h;player.vy=0}else if(player.x+player.w/2<p.x+p.w/2){player.x=p.x-player.w}else{player.x=p.x+p.w}}}}
function update(){if(end)return;let move=0;if(keys['arrowleft']||keys['a'])move=-1;if(keys['arrowright']||keys['d'])move=1;player.vx=move*hero.speed;if(move)player.face=move;if((keys[' ']||keys['w']||keys['arrowup'])&&player.onGround){player.vy=-hero.jump;player.onGround=false;spawn(player.x+18,player.y+54,'#fff')}player.vy+=gravity;player.x+=player.vx;player.y+=player.vy;solidCollision();player.x=Math.max(0,Math.min(worldW-player.w,player.x));if(player.y>850){life--;respawn()}if(player.invul>0)player.invul--;for(const e of enemies){e.x+=e.dir*1.4;if(e.x<e.min||e.x>e.max)e.dir*=-1;if(player.x<e.x+e.w&&player.x+player.w>e.x&&player.y<e.y+e.h&&player.y+player.h>e.y&&player.invul<=0){if(player.vy>2&&player.y+player.h<e.y+18){e.dead=true;player.vy=-10;spawn(e.x+20,e.y,'#9df75e')}else{life--;player.invul=80;player.vx=-player.face*8;showToast('Ahi! Hai perso un cuore.')}}}enemies=enemies.filter(e=>!e.dead);for(const c of crystalItems){if(!c.got&&Math.hypot((player.x+17)-c.x,(player.y+25)-c.y)<38){c.got=true;crystals++;spawn(c.x,c.y,'#36d9ff');showToast('Cristallo raccolto!')}}if(player.x>3980){end=true;document.getElementById('endStats').textContent=`Hai raccolto ${crystals} cristalli con ${hero.name}.`;document.getElementById('endBox').style.display='flex'}camX+=(player.x-430-camX)*.08;camX=Math.max(0,Math.min(worldW-W,camX));particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--});particles=particles.filter(p=>p.life>0);if(toastTimer>0){toastTimer--;if(toastTimer===0)document.getElementById('toast').style.display='none'}document.getElementById('leftHud').innerHTML=`<span>❤️ ${life}</span><span>⚡ ${Math.round(energy)}</span><span>💎 ${crystals}</span>`;document.getElementById('rightHud').innerHTML=`${hero.name} · x ${Math.round(player.x)}`}
function respawn(){if(life<=0){resetLevel();return}player.x=checkpoint.x;player.y=checkpoint.y;player.vy=0;player.invul=80;showToast('Riprova dal checkpoint!')}
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.style.display='block';toastTimer=120}
function spawn(x,y,color){for(let i=0;i<16;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.9)*5,life:35,color})}
function drawPixelRect(x,y,w,h,c,shadow){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));if(shadow){ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(Math.round(x+w*.62),Math.round(y),Math.round(w*.38),Math.round(h))}}
function drawBackground(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#177fe8');g.addColorStop(.58,'#8bd8ff');g.addColorStop(1,'#daf8ff');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(let i=0;i<12;i++){const x=(i*420-(camX*.25)%420);ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.ellipse(x+70,110+(i%3)*50,55,20,0,0,7);ctx.ellipse(x+115,110+(i%3)*50,45,28,0,0,7);ctx.ellipse(x+155,116+(i%3)*50,58,18,0,0,7);ctx.fill()}for(let i=0;i<7;i++){const x=i*650-(camX*.5)%650;ctx.fillStyle='rgba(72,132,89,.4)';ctx.beginPath();ctx.moveTo(x+40,530);ctx.lineTo(x+200,260);ctx.lineTo(x+360,530);ctx.fill()}}
function drawPlatform(p){const x=p.x-camX,y=p.y;if(x+p.w<0||x>W)return;const grass=p.type==='grass';ctx.fillStyle=grass?'#5ac53f':p.type==='wood'?'#9b5a26':'#8b9499';ctx.fillRect(x,y,p.w,p.h);if(grass){ctx.fillStyle='#8def3f';ctx.fillRect(x,y,p.w,16);ctx.fillStyle='#6a3d20';for(let i=0;i<p.w;i+=32){ctx.fillRect(x+i,y+20,24,p.h-25);ctx.fillStyle='#7f4b27';ctx.fillRect(x+i+5,y+28,12,12);ctx.fillStyle='#6a3d20'}}else if(p.type==='wood'){ctx.strokeStyle='#5c3216';for(let i=0;i<p.w;i+=28){ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i,y+p.h);ctx.stroke()}}else{ctx.strokeStyle='#5d6468';for(let i=0;i<p.w;i+=38){ctx.strokeRect(x+i,y+4,30,26)}}}
function drawPlayer(){const x=player.x-camX,y=player.y;ctx.save();if(player.invul>0&&Math.floor(player.invul/6)%2===0)ctx.globalAlpha=.45;drawPixelRect(x+7,y+17,20,28,hero.color,true);drawPixelRect(x+3,y+45,11,10,'#2d3445');drawPixelRect(x+20,y+45,11,10,'#2d3445');drawPixelRect(x+5,y+25,7,21,'#f5bd82');drawPixelRect(x+24,y+25,7,21,'#f5bd82');drawPixelRect(x+4,y+2,26,22,hero.class==='nox'?'#53d643':hero.class==='luna'?'#ffd04a':hero.class==='noah'?'#111':'#7a3e18');drawPixelRect(x+7,y+8,22,22,hero.class==='nox'?'#4edbc2':'#f6c28c',true);drawPixelRect(x+13,y+18,4,5,'#073050');drawPixelRect(x+24,y+18,4,5,'#073050');if(hero.class==='luna'){ctx.fillStyle='#f3cf4f';ctx.font='20px serif';ctx.fillText('♕',x+8,y+6)}ctx.restore()}
function drawCrystal(c){if(c.got)return;const x=c.x-camX,y=c.y;ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(Date.now()/250+c.x)*.12);ctx.fillStyle='#33d8ff';ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(14,0);ctx.lineTo(0,18);ctx.lineTo(-14,0);ctx.closePath();ctx.fill();ctx.strokeStyle='#d7ffff';ctx.lineWidth=3;ctx.stroke();ctx.restore()}
function drawEnemy(e){const x=e.x-camX,y=e.y;ctx.fillStyle='#70d646';ctx.beginPath();ctx.ellipse(x+21,y+22,24,16,0,0,7);ctx.fill();ctx.fillStyle='#153b16';ctx.fillRect(x+12,y+16,5,6);ctx.fillRect(x+28,y+16,5,6);ctx.fillStyle='rgba(255,255,255,.55)';ctx.fillRect(x+8,y+8,10,5)}
function drawLevelDetails(){// trees, flag, checkpoint
for(const tx of [250,1550,2380,3650]){const x=tx-camX;if(x<-120||x>W+120)continue;ctx.fillStyle='#7b461f';ctx.fillRect(x,430,34,160);ctx.fillStyle='#3faa35';ctx.beginPath();ctx.arc(x+20,415,58,0,7);ctx.arc(x-15,455,48,0,7);ctx.arc(x+55,455,48,0,7);ctx.fill();}let fx=4050-camX;ctx.fillStyle='#6b3d1c';ctx.fillRect(fx,390,10,155);ctx.fillStyle='#e53b32';ctx.beginPath();ctx.moveTo(fx+10,390);ctx.lineTo(fx+90,420);ctx.lineTo(fx+10,450);ctx.fill();ctx.fillStyle='#ffd54c';ctx.font='34px Arial';ctx.fillText('★',fx+30,430);let cx=1780-camX;ctx.fillStyle='#d59b3a';ctx.fillRect(cx,460,16,70);ctx.fillStyle='#3c8bff';ctx.fillRect(cx-20,450,50,30)}
function draw(){drawBackground();drawLevelDetails();platforms.forEach(drawPlatform);crystalItems.forEach(drawCrystal);enemies.forEach(drawEnemy);drawPlayer();particles.forEach(p=>{ctx.fillStyle=p.color;ctx.fillRect(p.x-camX,p.y,5,5)});}
function loop(){if(gameState!=='play')return;update();draw();requestAnimationFrame(loop)}
</script>
</body>
</html>
