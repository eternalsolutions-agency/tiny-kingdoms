<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AND: Tiny Kingdoms v0.6.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="overlay" class="screen active">
      <div class="logo">AND</div>
      <div class="subtitle">Tiny Kingdoms</div>
      <button id="newGame" class="btn">Nuova Partita</button>
      <button id="commands" class="btn secondary">Comandi</button>
      <div id="commandBox" class="commands hidden">← → / A D = muovi · Spazio = salto · R = riparti dal checkpoint · P = pausa</div>
    </div>
    <div id="select" class="screen hidden">
      <h1>Scegli il tuo eroe</h1>
      <div class="cards">
        <button class="card" data-id="leo"><span class="avatar boy">●</span><b>Leo</b><small>Equilibrato</small></button>
        <button class="card" data-id="noah"><span class="avatar fast">●</span><b>Noah</b><small>Veloce</small></button>
        <button class="card" data-id="zipp"><span class="avatar odd">●</span><b>Zipp</b><small>Strano</small></button>
        <button class="card" data-id="luna"><span class="avatar princess">●</span><b>Luna</b><small>Principessa</small></button>
      </div>
      <button id="start" class="btn">Inizia Avventura</button>
    </div>
    <div id="finish" class="screen hidden">
      <div class="logo small">Livello completato!</div>
      <p id="scoreText"></p>
      <button id="again" class="btn">Rigioca</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
